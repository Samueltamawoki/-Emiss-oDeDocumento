<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pedido de Compra Multi-Itens</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="no-print container-form">
    <h1>Novo Pedido de Compra</h1>
    
    <div class="header-inputs">
      <input type="text" placeholder="Nome da Empresa" id="c1" value="TechNova Solutions">
      <input type="date" id="c2">
      <input type="text" placeholder="Responsável / Aprovador" id="c7">
    </div>

    <h3>Itens do Pedido</h3>
    <table id="tabela-input">
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Qtd</th>
          <th>Vlr. Unitário</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="corpo-itens">
        </tbody>
    </table>
    
    <button onclick="adicionarLinha()" class="btn-add">+ Adicionar Item</button>

    <textarea placeholder="Observações..." id="c8"></textarea>

    <div class="actions">
      <button onclick="gerar()" class="btn-pdf">Gerar Relatório</button>
      <button onclick="gerar(true)" class="btn-pdf">Salvar PDF</button>
      <button onclick="gerar(false, true)" class="btn-print">Imprimir</button>
    </div>
  </div>

  <div id="relatorio">
    <div class="header-timbrado">
      <div class="logo">TECH<span>NOVA</span></div>
      <div class="empresa-info">
        <h2 id="r1"></h2>
        <p>Emissão: <span id="r2"></span></p>
      </div>
    </div>

    <table class="tabela-final">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qtd</th>
          <th>Unitário</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="r-itens">
        </tbody>
      <tfoot>
        <tr>
          <td colspan="3" style="text-align:right"><strong>VALOR TOTAL:</strong></td>
          <td id="r-total-geral">R$ 0,00</td>
        </tr>
      </tfoot>
    </table>

    <div class="obs-section">
      <strong>Observações:</strong>
      <p id="r8"></p>
    </div>

    <div class="assinaturas">
      <div class="campo-assinatura"><div class="linha"></div><p>Solicitante</p></div>
      <div class="campo-assinatura"><div class="linha"></div><p id="r7"></p></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
